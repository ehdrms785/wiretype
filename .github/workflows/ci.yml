name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Smoke test the packed tarball
        run: |
          npm pack --pack-destination /tmp
          mkdir -p /tmp/consumer && cd /tmp/consumer && npm init -y
          npm i /tmp/wiretype-*.tgz
          npx wiretype --help
          node --input-type=module -e "import { inferShape } from 'wiretype'; import plugin from 'wiretype/vite'; console.log('exports ok', typeof inferShape, typeof plugin)"
